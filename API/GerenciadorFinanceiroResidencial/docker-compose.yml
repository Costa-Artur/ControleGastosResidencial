services:
  gerenciadorfinanceiroresidencial-api:
    image: gerenciadorfinanceiroresidencial.api
    container_name: GerenciadorFinanceiroResidencial.Api
    ports:
      - "8080:8080"
      - "5211:5211"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=gerenciador-financeiro;Username=postgres;Password=postgres
    build:
      context: .
      dockerfile: GerenciadorFinanceiroResidencial.Api/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      
  postgres:
    image: postgres:latest
    container_name: GerenciadorFinanceiroResidencial.PostgreSQL
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gerenciador-financeiro
    volumes:
      - postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d gerenciador-financeiro"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres:

